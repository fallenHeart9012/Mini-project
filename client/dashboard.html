<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <title>Throttling Sentinel - Dashboard</title>
</head>

<body>
    <div id="background-animation">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>
    
    <div id="app">
        <div id="dashboard-content">
            <header>
                <div class="logo-group">
                    <div class="logo-row">
                        <div class="logo-orb small-orb"></div>
                        <h1>SENTINEL</h1>
                        <div class="status-badge-inline">
                            <div class="pulse"></div>
                            <span id="system-status-text">OPERATIONAL</span>
                        </div>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="btn-logout" class="btn-ghost-small"><i class='bx bx-log-out'></i> LOGOUT</button>
                </div>
            </header>

            <main class="dashboard-grid">
                <!-- Live Metrics Section -->
                <section class="col-span-12 dashboard-grid">
                    <div class="col-span-3 card glass-pane">
                        <div class="card-title">
                            <i class='bx bxs-pie-chart-alt-2'></i>
                            AVAILABLE CAPACITY
                        </div>
                        <div class="metric-value"><span id="metric-capacity">--</span></div>
                        <div class="metric-unit">REQUESTS / SECOND</div>
                    </div>

                    <div class="col-span-3 card glass-pane">
                        <div class="card-title">
                            <i class='bx bxs-bolt-circle'></i>
                            SYSTEM LOAD
                        </div>
                        <div class="metric-value"><span id="metric-load">--</span><span class="metric-unit">%</span>
                        </div>
                        <div class="progress-container">
                            <div id="load-progress-bar" class="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="col-span-3 card glass-pane">
                        <div class="card-title">
                            <i class='bx bxs-time-five'></i>
                            NEXT RESET
                        </div>
                        <div class="metric-value"><span id="metric-reset">--</span><span class="metric-unit">s</span>
                        </div>
                        <div class="metric-unit">TOKEN BUCKET REFILL WINDOW</div>
                    </div>

                    <div class="col-span-3 card glass-pane">
                        <div class="card-title">
                            <i class='bx bxs-layer'></i>
                            BUCKET STATUS
                        </div>
                        <div class="metric-value"><span id="metric-tokens">--</span></div>
                        <div id="tokens-status-tag" class="metric-unit">READY TO SERVE</div>
                    </div>
                </section>

                <!-- API Tester Section -->
                <section class="col-span-4 card glass-pane">
                    <div class="card-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                        </svg>
                        API COMMAND CENTER
                    </div>

                    <div class="input-group">
                        <label>API CREDENTIALS</label>
                        <input type="text" id="api-key" placeholder="Enter X-API-KEY..." value="enterprise-key-001">
                    </div>

                    <div class="input-group">
                        <label>TARGET ENDPOINT</label>
                        <select id="api-endpoint">
                            <option value="/api/status">GET /api/status [LIGHT]</option>
                            <option value="/api/orders">POST /api/orders [MEDIUM]</option>
                            <option value="/api/heavy-task">POST /api/heavy-task [CRITICAL]</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>REQUEST COMPLEXITY</label>
                        <input type="range" id="api-complexity" min="1" max="10" value="1">
                        <div
                            style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted);">
                            <span>LIGHT</span>
                            <span id="complexity-label">COST: 1 TOKENS</span>
                            <span>HEAVY</span>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                        <button id="btn-fire" style="grid-column: span 2;">🔥 FIRE REQUEST</button>
                        <button id="btn-burst" style="background: var(--accent); white-space: nowrap;">⚡ BURST
                            MODE</button>
                        <button id="btn-clear" style="background: rgba(255,255,255,0.05);">🧹 CLEAR LOGS</button>
                    </div>
                </section>

                <!-- Logs Section -->
                <section class="col-span-8 card glass-pane">
                    <div class="card-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.5 8.5 0 0 1 4.6 1.4L21 4v8h-8l3.4-3.4" />
                        </svg>
                        TRAFFIC TELEMETRY
                    </div>
                    <div id="log-display" class="log-container">
                        <div class="log-entry" style="color: var(--text-muted); opacity: 0.5;">
                            <span>INIT</span>
                            <span>Waiting for API traffic telemetry...</span>
                        </div>
                    </div>
                </section>

                <!-- Login History Link -->
                <section class="col-span-12 card glass-pane" style="margin-top: 1rem; padding: 1.25rem 2rem;">
                    <a href="/history.html" style="display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: inherit;">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <i class='bx bxs-user-detail' style="font-size: 1.25rem; color: var(--secondary);"></i>
                            <span style="font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase;">LOGIN AUDIT TRAIL</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem; color: var(--primary); font-size: 0.8rem; font-weight: 600;">
                            VIEW FULL HISTORY <i class='bx bx-right-arrow-alt' style="font-size: 1.2rem;"></i>
                        </div>
                    </a>
                </section>
            </main>
        </div>
    </div>
    <script type="module" src="/src/dashboard.js"></script>
</body>

</html>
