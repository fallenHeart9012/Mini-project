<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <title>Throttling Sentinel - Secure Access</title>
</head>

<body>
  <div id="background-animation">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
  </div>
  
  <div id="app">
    <section id="auth-screen" class="auth-container">
      <div class="auth-card glass-pane">
        
        <div class="form-wrapper" id="form-wrapper">
          <div id="auth-status-msg" class="status-msg" style="display: none;"></div>
          
          <!-- Login Form -->
          <div class="form-section" id="login-section">
            <div class="login-header">
              <div class="logo-orb"></div>
              <h2>WELCOME BACK</h2>
              <p>Sign in to continue</p>
            </div>
            
            <form id="login-form">
              <div class="input-group">
                <i class='bx bxs-user input-icon'></i>
                <input type="text" id="login-username" placeholder=" " required>
                <label>System Identifier</label>
                <div class="focus-border"></div>
              </div>
              <div class="input-group">
                <i class='bx bxs-lock-alt input-icon'></i>
                <input type="password" id="login-password" placeholder=" " required>
                <label>Security Token</label>
                <div class="focus-border"></div>
              </div>
              
              <div id="login-error" class="error-msg" style="display: none;">
                Invalid credentials. Access denied.
              </div>
              
              <button type="submit" id="btn-login" class="btn-primary">
                <span class="btn-text">AUTHORIZE ACCESS</span>
                <div class="btn-loader" style="display: none;"></div>
              </button>
            </form>
            
            <div class="toggle-text">
              Don't have an account? <span class="toggle-link" id="go-to-signup">Sign up</span>
            </div>
          </div>
          
          <!-- Signup Form -->
          <div class="form-section hide-section" id="signup-section">
            <div class="login-header">
              <div class="logo-orb"></div>
              <h2>CREATE ACCOUNT</h2>
              <p>Join Sentinel today</p>
            </div>
            
            <form id="signup-form">
              <div class="input-group">
                <i class='bx bxs-user input-icon'></i>
                <input type="text" id="signup-username" placeholder=" " required>
                <label>System Identifier</label>
                <div class="focus-border"></div>
              </div>
              <div class="input-group">
                <i class='bx bxs-envelope input-icon'></i>
                <input type="email" id="signup-email" placeholder=" " required>
                <label>Email Address</label>
                <div class="focus-border"></div>
              </div>
              <div class="input-group">
                <i class='bx bxs-lock-alt input-icon'></i>
                <input type="password" id="signup-password" placeholder=" " required>
                <label>Security Token</label>
                <div class="focus-border"></div>
              </div>
              
              <div id="signup-error" class="error-msg" style="display: none;">
                Registration failed.
              </div>
              
              <button type="submit" id="btn-signup" class="btn-primary">
                <span class="btn-text">REGISTER ACCESS</span>
                <div class="btn-loader" style="display: none;"></div>
              </button>
            </form>
            
            <div class="toggle-text">
              Already have an account? <span class="toggle-link" id="go-to-login">Log in</span>
            </div>
          </div>
          
        </div>
      </div>
    </section>
  </div>
  <script type="module" src="/src/auth.js"></script>
</body>

</html>
